<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHL Franchise Simulator — Puck Fantasy League</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <span class="brand-mark">PHL</span>
        <span class="brand-text">Franchise Simulator <span class="muted">for Puck</span></span>
      </div>
      <div class="header-meta" id="header-meta"></div>
      <div class="header-advance" id="header-advance"></div>
    </div>
    <nav class="tab-nav" id="tab-nav">
      <button class="tab-btn" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="startup">Startup Draft</button>
      <button class="tab-btn" data-tab="teams">Teams</button>
      <button class="tab-btn" data-tab="players">Players</button>
      <button class="tab-btn" data-tab="schedule">Schedule</button>
      <button class="tab-btn" data-tab="standings">Standings</button>
      <button class="tab-btn" data-tab="playoffs">Playoffs</button>
      <button class="tab-btn" data-tab="draft">Draft</button>
      <button class="tab-btn" data-tab="promotions">Promotions</button>
      <button class="tab-btn" data-tab="contracts">Contracts</button>
      <button class="tab-btn" data-tab="stats">Stats &amp; Offseason</button>
      <button class="tab-btn" data-tab="data">Data Tools</button>
    </nav>
  </header>

  <main class="app-main">
    <section class="tab-panel" id="tab-dashboard"></section>
    <section class="tab-panel" id="tab-startup"></section>
    <section class="tab-panel" id="tab-teams"></section>
    <section class="tab-panel" id="tab-teamdetail"></section>
    <section class="tab-panel" id="tab-players"></section>
    <section class="tab-panel" id="tab-schedule"></section>
    <section class="tab-panel" id="tab-standings"></section>
    <section class="tab-panel" id="tab-playoffs"></section>
    <section class="tab-panel" id="tab-draft"></section>
    <section class="tab-panel" id="tab-promotions"></section>
    <section class="tab-panel" id="tab-contracts"></section>
    <section class="tab-panel" id="tab-stats"></section>
    <section class="tab-panel" id="tab-data"></section>
  </main>

  <footer class="app-footer">
    <p class="muted small">PHL Franchise Simulator &middot; a fan-made, offline sandbox for the <em>Puck</em> community &middot; all data lives in your browser (or in the JSON file you import/export)</p>
  </footer>

  <input type="file" id="import-file-input" accept="application/json" style="display:none">

  <!-- Plain scripts (no ES modules) so this runs from a double-clicked
       index.html as well as from GitHub Pages / any static host. -->
  <script src="js/utils.js"></script>
  <script src="js/starterData.js"></script>
  <script src="js/state.js"></script>
  <script src="js/sim.js"></script>
  <script src="js/startupDraft.js"></script>
  <script src="js/teams.js"></script>
  <script src="js/players.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/standings.js"></script>
  <script src="js/playoffs.js"></script>
  <script src="js/draft.js"></script>
  <script src="js/promotions.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/aiManager.js"></script>
  <script src="js/expansion.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/teamDetail.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/datatools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
