<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHL Franchise Simulator — Puck Fantasy League</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-mark">PHL</span>
        <span class="sidebar-brand-text">Franchise<br>Simulator</span>
      </div>

      <div class="sidebar-franchise" id="sidebar-franchise"></div>

      <div class="sidebar-section-label">Navigation</div>
      <nav class="sidebar-nav" id="tab-nav">
        <button class="nav-item" data-tab="dashboard"><span class="nav-icon">&#9673;</span><span>Dashboard</span></button>
        <button class="nav-item" data-tab="startup"><span class="nav-icon">&#9873;</span><span>Startup Draft</span></button>
        <button class="nav-item" data-tab="teammanagement" style="display:none"><span class="nav-icon">&#9974;</span><span>Team Management</span></button>
        <button class="nav-item" data-tab="inbox"><span class="nav-icon">&#128233;</span><span>Inbox</span></button>
        <button class="nav-item" data-tab="teams"><span class="nav-icon">&#9974;</span><span>Teams</span></button>
        <button class="nav-item" data-tab="players"><span class="nav-icon">&#9787;</span><span>Players</span></button>
        <button class="nav-item" data-tab="schedule"><span class="nav-icon">&#128197;</span><span>Schedule</span></button>
        <button class="nav-item" data-tab="standings"><span class="nav-icon">&#9776;</span><span>Standings</span></button>
        <button class="nav-item" data-tab="playoffs"><span class="nav-icon">&#127942;</span><span>Playoffs</span></button>
        <button class="nav-item" data-tab="trades"><span class="nav-icon">&#8646;</span><span>Trades</span></button>
        <button class="nav-item" data-tab="promotions"><span class="nav-icon">&#8593;</span><span>Promotions</span></button>
        <button class="nav-item" data-tab="contracts"><span class="nav-icon">&#128181;</span><span>Contracts &amp; Cap</span></button>
        <button class="nav-item" data-tab="scrims"><span class="nav-icon">&#9889;</span><span>Scrims</span></button>
        <button class="nav-item" data-tab="stats"><span class="nav-icon">&#128200;</span><span>Stats &amp; Offseason</span></button>
        <button class="nav-item" data-tab="data"><span class="nav-icon">&#128451;</span><span>Data Tools</span></button>
      </nav>

      <div class="sidebar-bottom">
        <button class="btn-sidebar-action" id="btn-save-exit">
          <span class="nav-icon">&#8617;</span><span>Save Progress</span>
        </button>
      </div>
    </aside>

    <div class="main-area">
      <header class="top-header">
        <div class="top-header-title">
          <div class="top-header-eyebrow">Career Mode</div>
          <h1 id="top-header-heading">Dashboard</h1>
        </div>
        <div class="top-header-stats" id="header-meta"></div>
        <div class="header-advance" id="header-advance"></div>
      </header>

      <main class="app-main">
        <section class="tab-panel" id="tab-dashboard"></section>
        <section class="tab-panel" id="tab-startup"></section>
        <section class="tab-panel" id="tab-teammanagement"></section>
        <section class="tab-panel" id="tab-inbox"></section>
        <section class="tab-panel" id="tab-teams"></section>
        <section class="tab-panel" id="tab-teamdetail"></section>
        <section class="tab-panel" id="tab-players"></section>
        <section class="tab-panel" id="tab-schedule"></section>
        <section class="tab-panel" id="tab-standings"></section>
        <section class="tab-panel" id="tab-playoffs"></section>
        <section class="tab-panel" id="tab-trades"></section>
        <section class="tab-panel" id="tab-promotions"></section>
        <section class="tab-panel" id="tab-contracts"></section>
        <section class="tab-panel" id="tab-scrims"></section>
        <section class="tab-panel" id="tab-stats"></section>
        <section class="tab-panel" id="tab-data"></section>
      </main>

      <footer class="app-footer">
        <p class="muted small">PHL Franchise Simulator &middot; a fan-made, offline sandbox for the <em>Puck</em> community &middot; all data lives in your browser (or in the JSON file you import/export)</p>
      </footer>
    </div>
  </div>

  <input type="file" id="import-file-input" accept="application/json" style="display:none">

  <!-- Plain scripts (no ES modules) so this runs from a double-clicked
       index.html as well as from GitHub Pages / any static host. -->
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/boxscoreModal.js"></script>
  <script src="js/starterData.js"></script>
  <script src="js/state.js"></script>
  <script src="js/sim.js"></script>
  <script src="js/startupDraft.js"></script>
  <script src="js/teamManagement.js"></script>
  <script src="js/inbox.js"></script>
  <script src="js/mvp.js"></script>
  <script src="js/scrims.js"></script>
  <script src="js/teams.js"></script>
  <script src="js/players.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/standings.js"></script>
  <script src="js/playoffs.js"></script>
  <script src="js/promotions.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/aiManager.js"></script>
  <script src="js/trades.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/teamDetail.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/datatools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
